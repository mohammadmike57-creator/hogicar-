<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hogicar</title>

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/index.css">
    <!-- Error display container -->
    <style>
      #error-display {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #ffdddd;
        color: #990000;
        padding: 20px;
        font-family: monospace;
        white-space: pre-wrap;
        z-index: 9999;
        border: 2px solid red;
        display: none;
      }
    </style>
    <div id="error-display"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errorDiv = document.getElementById('error-display');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '<strong>JavaScript Error:</strong><br>' + msg + '<br>at ' + url + ':' + line + ':' + col + '<br><pre>' + (error ? error.stack : '') + '</pre>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.getElementById('error-display');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '<strong>Unhandled Promise Rejection:</strong><br>' + event.reason + '<br><pre>' + (event.reason ? event.reason.stack : '') + '</pre>';
      });
    </script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MHN6Q99H"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>
    <script type="module">
      try {
        import('/index.tsx?v=7');
      } catch (e) {
        var errorDiv = document.getElementById('error-display');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '<strong>Module import error:</strong><br>' + e.stack;
      }
    </script>
  </body>
</html>
