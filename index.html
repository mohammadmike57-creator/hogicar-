    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      /* Force static viewport and prevent zoom on input focus for iOS */
      html {
        -webkit-text-size-adjust: 100%; /* Prevent font scaling in landscape */
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="url"],
      input[type="password"],
      input[type="search"],
      input[type="number"],
      input[type="date"],
      textarea,
      select {
        font-size: 16px !important;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* Marquee Animation */
      @keyframes scroll-rtl {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
      @keyframes scroll-ltr {
        from { transform: translateX(-50%); }
        to { transform: translateX(0); }
      }
      .animate-scroll-rtl {
        animation: scroll-rtl 80s linear infinite;
      }
      .animate-scroll-ltr {
        animation: scroll-ltr 80s linear infinite;
      }
      .marquee-container:hover .animate-scroll-rtl,
      .marquee-container:hover .animate-scroll-ltr {
        animation-play-state: paused;
      }
      /* Professional flip-down animation for social proof message */
      @keyframes flip-in {
        0% {
            transform: perspective(800px) rotateX(-90deg);
            opacity: 0;
        }
        60% {
            transform: perspective(800px) rotateX(20deg);
            opacity: 1;
        }
        80% {
            transform: perspective(800px) rotateX(-5deg);
        }
        100% {
            transform: perspective(800px) rotateX(0deg);
            opacity: 1;
        }
      }
      .animate-flip-in {
        animation: flip-in 0.8s ease-out forwards;
        animation-delay: 3.5s;
        transform-origin: top center;
      }
    </style>
